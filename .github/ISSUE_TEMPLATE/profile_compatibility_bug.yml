name: Profile compatibility bug
description: Report a bug in profile resolution, compatibility aliases, or cross-profile behavior.
title: "[Compatibility Bug]: "
labels:
  - bug
  - compatibility
  - triage
body:
  - type: input
    id: platform_version
    attributes:
      label: Platform version
      description: Provide the release tag, package version, or commit SHA you tested.
      placeholder: e.g. 1.0.0 or abc1234
    validations:
      required: true
  - type: dropdown
    id: target_profile
    attributes:
      label: Target profile under test
      options:
        - generic
        - talkstore
        - aci
        - cross-profile or migration case
    validations:
      required: true
  - type: dropdown
    id: talkstore_compatibility
    attributes:
      label: Is TalkStore compatibility involved?
      options:
        - "Yes"
        - "No"
        - Not sure
    validations:
      required: true
  - type: checkboxes
    id: compatibility_surface
    attributes:
      label: Compatibility surface involved
      description: Select every alias or compatibility path that applies.
      options:
        - label: TALKSTORE_PROJECT_ROOT
        - label: talkstore-tracker.json
        - label: talkstore CLI alias
        - label: sibling ../talkstore fallback
        - label: mirrored TalkStore playbook
        - label: other compatibility surface
  - type: textarea
    id: environment
    attributes:
      label: OS and runtime environment
      description: Include OS version, Node version, and whether you were using the app, the MCP package, or scripts.
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual_behavior
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Set ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Migration or rollout impact
      description: Explain whether this blocks fresh installs, TalkStore compatibility, or both.
